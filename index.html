<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <header id="navbar">
    <div class="nav-inner">
      <a href="#" class="logo" onclick="showPage('home')">✦ Blog</a>
      <nav id="nav-links">
        <a href="#" onclick="showPage('home')">Yazılar</a>
        <span id="nav-auth-area"></span>
      </nav>
    </div>
  </header>

  <!-- PAGES -->
  <main id="app">

    <!-- HOME PAGE -->
    <section id="page-home" class="page active">
      <div class="hero">
        <p class="hero-sub">Düşünceler, notlar ve daha fazlası</p>
        <h1>Blog</h1>
      </div>
      <div class="posts-grid" id="posts-container">
        <div class="loading-spinner"><span></span></div>
      </div>
    </section>

    <!-- POST DETAIL PAGE -->
    <section id="page-detail" class="page">
      <div class="detail-wrap" id="post-detail-content"></div>
    </section>

    <!-- AUTH PAGE -->
    <section id="page-auth" class="page">
      <div class="auth-card">
        <div class="auth-tabs">
          <button class="tab-btn active" onclick="switchTab('login')">Giriş Yap</button>
          <button class="tab-btn" onclick="switchTab('register')">Kayıt Ol</button>
        </div>

        <div id="tab-login">
          <button class="btn-google" onclick="loginWithGoogle()">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.7C34.7 33.1 30 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l6.3-6.3C34.2 6 29.4 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.2-4z"/></svg>
            Google ile Giriş Yap
          </button>
          <div class="divider"><span>veya</span></div>
          <input type="email" id="login-email" placeholder="E-posta" />
          <input type="password" id="login-password" placeholder="Şifre" />
          <button class="btn-primary" onclick="loginWithEmail()">Giriş Yap</button>
        </div>

        <div id="tab-register" style="display:none">
          <button class="btn-google" onclick="loginWithGoogle()">
            <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M44.5 20H24v8.5h11.7C34.7 33.1 30 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 2.9l6.3-6.3C34.2 6 29.4 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20c11 0 19.7-8 19.7-20 0-1.3-.1-2.7-.2-4z"/></svg>
            Google ile Kayıt Ol
          </button>
          <div class="divider"><span>veya</span></div>
          <input type="text" id="reg-name" placeholder="Adınız" />
          <input type="email" id="reg-email" placeholder="E-posta" />
          <input type="password" id="reg-password" placeholder="Şifre (en az 6 karakter)" />
          <button class="btn-primary" onclick="registerWithEmail()">Kayıt Ol</button>
        </div>

        <p id="auth-error" class="auth-error"></p>
      </div>
    </section>

    <!-- ADMIN PAGE -->
    <section id="page-admin" class="page">
      <div class="admin-wrap">
        <h2>Yönetici Paneli</h2>
        <div class="admin-form">
          <input type="text" id="post-title" placeholder="Yazı Başlığı" />
          <input type="text" id="post-cover" placeholder="Kapak Görseli URL (isteğe bağlı)" />
          <textarea id="post-body" placeholder="İçerik (Markdown desteklenir)&#10;&#10;## Başlık&#10;**Kalın metin**, *italik*&#10;- Madde&#10;> Alıntı"></textarea>
          <div class="admin-actions">
            <button class="btn-primary" onclick="publishPost()">Yayınla</button>
            <span id="admin-msg"></span>
          </div>
        </div>
        <hr class="divider-line" />
        <h3>Yayınlanan Yazılar</h3>
        <div id="admin-posts-list"></div>
      </div>
    </section>

  </main>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- Firebase -->
  <script type="module" src="js/firebase-config.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
